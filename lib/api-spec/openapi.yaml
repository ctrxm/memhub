openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MemeHub API - 9GAG Clone
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: posts
    description: Meme posts
  - name: comments
    description: Comments
  - name: votes
    description: Voting
  - name: users
    description: User profiles
  - name: tags
    description: Tags and categories
  - name: notifications
    description: Notifications
  - name: admin
    description: Admin panel
  - name: upload
    description: File upload

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /posts:
    get:
      operationId: getPosts
      tags: [posts]
      summary: Get posts feed
      parameters:
        - name: section
          in: query
          schema:
            type: string
            enum: [hot, trending, fresh, top]
            default: hot
        - name: tag
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
            default: 1
        - name: limit
          in: query
          schema:
            type: number
            default: 10
      responses:
        "200":
          description: Posts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsListResponse"

    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /posts/{id}/vote:
    post:
      operationId: votePost
      tags: [votes]
      summary: Upvote or downvote a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteRequest"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResponse"

  /posts/{id}/save:
    post:
      operationId: savePost
      tags: [posts]
      summary: Save or unsave a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Save toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResponse"

  /posts/{id}/comments:
    get:
      operationId: getComments
      tags: [comments]
      summary: Get comments for a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
            default: 1
        - name: limit
          in: query
          schema:
            type: number
            default: 20
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsListResponse"

    post:
      operationId: createComment
      tags: [comments]
      summary: Create a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}/vote:
    post:
      operationId: voteComment
      tags: [votes]
      summary: Vote on a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteRequest"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResponse"

  /comments/{id}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{username}:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get user profile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{username}/posts:
    get:
      operationId: getUserPosts
      tags: [users]
      summary: Get posts by a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
            default: 1
      responses:
        "200":
          description: Posts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsListResponse"

  /users/{username}/follow:
    post:
      operationId: followUser
      tags: [users]
      summary: Follow or unfollow user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Follow toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResponse"

  /users/me/profile:
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/saved:
    get:
      operationId: getSavedPosts
      tags: [users]
      summary: Get saved posts
      parameters:
        - name: page
          in: query
          schema:
            type: number
            default: 1
      responses:
        "200":
          description: Saved posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsListResponse"

  /tags:
    get:
      operationId: getTags
      tags: [tags]
      summary: Get all tags
      responses:
        "200":
          description: Tags list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagsListResponse"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get user notifications
      parameters:
        - name: page
          in: query
          schema:
            type: number
            default: 1
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsListResponse"

  /notifications/read:
    post:
      operationId: markNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /upload/image:
    post:
      operationId: uploadImage
      tags: [upload]
      summary: Upload image to Hugging Face
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: Get all users (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: number
            default: 1
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersListResponse"

  /admin/users/{id}/ban:
    post:
      operationId: banUser
      tags: [admin]
      summary: Ban or unban user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanRequest"
      responses:
        "200":
          description: User banned/unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users/{id}/role:
    put:
      operationId: updateUserRole
      tags: [admin]
      summary: Update user role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/posts:
    get:
      operationId: getAdminPosts
      tags: [admin]
      summary: Get all posts (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: number
            default: 1
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, approved, removed]
            default: all
      responses:
        "200":
          description: Posts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPostsListResponse"

  /admin/posts/{id}/status:
    put:
      operationId: updatePostStatus
      tags: [admin]
      summary: Update post status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get site settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
    put:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update site settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettings"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /admin/tags:
    post:
      operationId: createTag
      tags: [admin]
      summary: Create a new tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"

  /admin/tags/{id}:
    delete:
      operationId: deleteTag
      tags: [admin]
      summary: Delete a tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/comments:
    get:
      operationId: getAdminComments
      tags: [admin]
      summary: Get all comments (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: number
            default: 1
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsListResponse"

  /search:
    get:
      operationId: searchPosts
      tags: [posts]
      summary: Search posts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
            default: 1
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsListResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - username
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        token:
          type: string
      required:
        - user
        - token

    UserProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        avatar:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, moderator, admin]
        isBanned:
          type: boolean
        followersCount:
          type: number
        followingCount:
          type: number
        postsCount:
          type: number
        totalPoints:
          type: number
        isFollowing:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - email
        - role
        - isBanned
        - followersCount
        - followingCount
        - postsCount
        - totalPoints
        - isFollowing
        - createdAt

    Post:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        imageUrl:
          type: string
        gifUrl:
          type: string
          nullable: true
        type:
          type: string
          enum: [image, gif, video]
        upvotes:
          type: number
        downvotes:
          type: number
        points:
          type: number
        commentsCount:
          type: number
        viewsCount:
          type: number
        status:
          type: string
          enum: [pending, approved, removed]
        userVote:
          type: string
          enum: [up, down]
          nullable: true
        isSaved:
          type: boolean
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        author:
          $ref: "#/components/schemas/PostAuthor"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - imageUrl
        - type
        - upvotes
        - downvotes
        - points
        - commentsCount
        - viewsCount
        - status
        - isSaved
        - tags
        - author
        - createdAt

    PostAuthor:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        avatar:
          type: string
          nullable: true
      required:
        - id
        - username

    PostsListResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total:
          type: number
        page:
          type: number
        totalPages:
          type: number
        hasMore:
          type: boolean
      required:
        - posts
        - total
        - page
        - totalPages
        - hasMore

    Comment:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        upvotes:
          type: number
        downvotes:
          type: number
        userVote:
          type: string
          enum: [up, down]
          nullable: true
        author:
          $ref: "#/components/schemas/PostAuthor"
        parentId:
          type: string
          nullable: true
        replies:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - upvotes
        - downvotes
        - author
        - createdAt

    CommentsListResponse:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        total:
          type: number
        page:
          type: number
        totalPages:
          type: number
      required:
        - comments
        - total
        - page
        - totalPages

    CreateCommentRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
        parentId:
          type: string
          nullable: true
      required:
        - content

    VoteRequest:
      type: object
      properties:
        direction:
          type: string
          enum: [up, down]
      required:
        - direction

    VoteResponse:
      type: object
      properties:
        upvotes:
          type: number
        downvotes:
          type: number
        points:
          type: number
        userVote:
          type: string
          enum: [up, down]
          nullable: true
      required:
        - upvotes
        - downvotes
        - points

    SaveResponse:
      type: object
      properties:
        isSaved:
          type: boolean
      required:
        - isSaved

    FollowResponse:
      type: object
      properties:
        isFollowing:
          type: boolean
        followersCount:
          type: number
      required:
        - isFollowing
        - followersCount

    Tag:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        postsCount:
          type: number
        color:
          type: string
          nullable: true
      required:
        - id
        - name
        - slug
        - postsCount

    TagsListResponse:
      type: object
      properties:
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
      required:
        - tags

    CreateTagRequest:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
          nullable: true
      required:
        - name

    CreatePostRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 200
        imageUrl:
          type: string
        type:
          type: string
          enum: [image, gif, video]
        tagIds:
          type: array
          items:
            type: string
      required:
        - title
        - imageUrl
        - type

    UpdateProfileRequest:
      type: object
      properties:
        bio:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true

    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [upvote, comment, reply, follow, mention]
        message:
          type: string
        isRead:
          type: boolean
        postId:
          type: string
          nullable: true
        fromUser:
          $ref: "#/components/schemas/PostAuthor"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - message
        - isRead
        - fromUser
        - createdAt

    NotificationsListResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadCount:
          type: number
        total:
          type: number
        page:
          type: number
        totalPages:
          type: number
      required:
        - notifications
        - unreadCount
        - total
        - page
        - totalPages

    UploadResponse:
      type: object
      properties:
        url:
          type: string
        filename:
          type: string
      required:
        - url
        - filename

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: number
        totalPosts:
          type: number
        totalComments:
          type: number
        totalVotes:
          type: number
        newUsersToday:
          type: number
        newPostsToday:
          type: number
        activeUsersThisWeek:
          type: number
        pendingPosts:
          type: number
      required:
        - totalUsers
        - totalPosts
        - totalComments
        - totalVotes
        - newUsersToday
        - newPostsToday
        - activeUsersThisWeek
        - pendingPosts

    AdminUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        avatar:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, moderator, admin]
        isBanned:
          type: boolean
        postsCount:
          type: number
        commentsCount:
          type: number
        totalPoints:
          type: number
        createdAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - username
        - email
        - role
        - isBanned
        - postsCount
        - commentsCount
        - totalPoints
        - createdAt

    AdminUsersListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
        total:
          type: number
        page:
          type: number
        totalPages:
          type: number
      required:
        - users
        - total
        - page
        - totalPages

    AdminPostsListResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total:
          type: number
        page:
          type: number
        totalPages:
          type: number
      required:
        - posts
        - total
        - page
        - totalPages

    BanRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
        isBanned:
          type: boolean
      required:
        - isBanned

    UpdateRoleRequest:
      type: object
      properties:
        role:
          type: string
          enum: [user, moderator, admin]
      required:
        - role

    UpdatePostStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, approved, removed]
      required:
        - status

    SiteSettings:
      type: object
      properties:
        siteName:
          type: string
        siteDescription:
          type: string
        allowRegistration:
          type: boolean
        requireApproval:
          type: boolean
        maxUploadSizeMb:
          type: number
        allowedFileTypes:
          type: array
          items:
            type: string
        huggingFaceRepo:
          type: string
        maintenanceMode:
          type: boolean
      required:
        - siteName
        - siteDescription
        - allowRegistration
        - requireApproval
        - maxUploadSizeMb
        - allowedFileTypes
        - huggingFaceRepo
        - maintenanceMode
